<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orkester </title>

  
  <script src="https://unpkg.com/vexflow/releases/vexflow-min.js"></script>
  <script src="score.js" defer></script>
  <script src="audio.js" defer></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #controls {
      margin: 20px;
    }

    #score {
      margin: 20px auto;
      width: 95%;
      height: 400px;
      position: relative;
    }

    #marker {
      position: absolute;
      width: 5px;
      background: red;
      pointer-events: none;
      transition: left 0.2s, top 0.2s;
    }

    select, input, button {
      font-size: 18px;
      padding: 5px 15px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h1>Orkester </h1>

<div id="controls">
  <input type="file" id="fileInput" accept=".xml" />
  <select id="instrumentSelect">
    <option value="">Izberi glasbilo</option>
    <option value="Flute">Flavta</option>
    <option value="Violin">Violina</option>
    <option value="Trumpet">Trobenta</option>
  </select>
  <button onclick="startConductor()">Začni </button>
</div>

<div id="score"></div>
<div id="marker"></div>

</body>
</html>
