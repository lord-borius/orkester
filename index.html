<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orkester App</title>

  
  <script src="https://unpkg.com/vexflow/releases/vexflow-min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #score {
      margin-top: 50px;
    }

    #pitch {
      font-size: 40px;
      margin-top: 30px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Orkester - Test Verzija</h1>

<div id="score"></div>

<button onclick="startAudio()">Začni poslušati</button>

<div id="pitch">Frekvenca: -- Hz</div>

<script>

  const VF = Vex.Flow;

  const div = document.getElementById("score");
  const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);

  renderer.resize(800, 200);
  const context = renderer.getContext();

  const stave = new VF.Stave(10, 40, 750);
  stave.addClef("treble").addTimeSignature("4/4");
  stave.setContext(context).draw();

  const notes = [
    new VF.StaveNote({ clef: "treble", keys: ["c/4"], duration: "q" }),
    new VF.StaveNote({ clef: "treble", keys: ["d/4"], duration: "q" }),
    new VF.StaveNote({ clef: "treble", keys: ["e/4"], duration: "q" }),
    new VF.StaveNote({ clef: "treble", keys: ["f/4"], duration: "q" })
  ];

  const voice = new VF.Voice({ num_beats: 4, beat_value: 4 });
  voice.addTickables(notes);

  const formatter = new VF.Formatter().joinVoices([voice]).format([voice], 700);
  voice.draw(context, stave);

  
  let audioContext;
  let analyser;
  let microphone;
  let dataArray;

  async function startAudio() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    microphone = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;

    const bufferLength = analyser.fftSize;
    dataArray = new Float32Array(bufferLength);

    microphone.connect(analyser);

    detectPitch();
  }

  function detectPitch() {
    analyser.getFloatTimeDomainData(dataArray);

    let pitch = autoCorrelate(dataArray, audioContext.sampleRate);

    if (pitch !== -1) {
      document.getElementById("pitch").innerText =
        "Frekvenca: " + pitch.toFixed(2) + " Hz";
    }

    requestAnimationFrame(detectPitch);
  }

  
  function autoCorrelate(buffer, sampleRate) {
    let SIZE = buffer.length;
    let rms = 0;

    for (let i = 0; i < SIZE; i++) {
      let val = buffer[i];
      rms += val * val;
    }
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.01) return -1;

    let r1 = 0, r2 = SIZE - 1, threshold = 0.2;

    for (let i = 0; i < SIZE/2; i++)
      if (Math.abs(buffer[i]) < threshold) { r1 = i; break; }

    for (let i = 1; i < SIZE/2; i++)
      if (Math.abs(buffer[SIZE-i]) < threshold) { r2 = SIZE-i; break; }

    buffer = buffer.slice(r1, r2);
    SIZE = buffer.length;

    let c = new Array(SIZE).fill(0);
    for (let i = 0; i < SIZE; i++)
      for (let j = 0; j < SIZE-i; j++)
        c[i] = c[i] + buffer[j] * buffer[j+i];

    let d = 0; 
    while (c[d] > c[d+1]) d++;

    let maxval = -1, maxpos = -1;
    for (let i = d; i < SIZE; i++) {
      if (c[i] > maxval) {
        maxval = c[i];
        maxpos = i;
      }
    }

    let T0 = maxpos;
    return sampleRate / T0;
  }

</script>

</body>
</html>
